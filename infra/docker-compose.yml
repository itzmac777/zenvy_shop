name: zenvy

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-zenvy}
      POSTGRES_USER: ${POSTGRES_USER:-zenvy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenvy} -d ${POSTGRES_DB:-zenvy}"]
      interval: 10s
      timeout: 5s
      retries: 5

  server:
    build:
      context: ..
      dockerfile: infra/docker/server.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:4100:4000"
    environment:
      PORT: 4000
      DATABASE_URL: ${DATABASE_URL:-postgres://zenvy:change_me@postgres:5432/zenvy}
      CLIENT_PUBLIC_URL: ${CLIENT_PUBLIC_URL:-https://shop.zenvy.com.bd}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://shop.zenvy.com.bd}
      GMPAY_BASE_URL: ${GMPAY_BASE_URL:-}
      GMPAY_PID: ${GMPAY_PID:-}
      GMPAY_SECRET_KEY: ${GMPAY_SECRET_KEY:-}
      GMPAY_CURRENCY: ${GMPAY_CURRENCY:-usd}
      GMPAY_USD_TO_FIAT_RATE: ${GMPAY_USD_TO_FIAT_RATE:-}
      GMPAY_FIAT_DUST_CENTS: ${GMPAY_FIAT_DUST_CENTS:-}
      GMPAY_NOTIFY_URL: ${GMPAY_NOTIFY_URL:-https://shop.zenvy.com.bd/api/gmpay/notify}
      GMPAY_RETURN_URL: ${GMPAY_RETURN_URL:-https://shop.zenvy.com.bd/order-inquiry}
      GMPAY_TOKEN: ${GMPAY_TOKEN:-}
      GMPAY_NETWORK: ${GMPAY_NETWORK:-}
      GMPAY_RECEIVE_ADDRESS: ${GMPAY_RECEIVE_ADDRESS:-}
      GMPAY_BSC_RPC_URLS: ${GMPAY_BSC_RPC_URLS:-}
      GMPAY_BSC_RPC_URL: ${GMPAY_BSC_RPC_URL:-}
      GMPAY_BSC_RPC_TIMEOUT_MS: ${GMPAY_BSC_RPC_TIMEOUT_MS:-10000}
      GMPAY_BSC_USDT_CONTRACT: ${GMPAY_BSC_USDT_CONTRACT:-}
      GMPAY_BSC_WATCHER_ENABLED: ${GMPAY_BSC_WATCHER_ENABLED:-true}
      GMPAY_BSC_WATCHER_INTERVAL_MS: ${GMPAY_BSC_WATCHER_INTERVAL_MS:-15000}
      GMPAY_BSC_WATCHER_CONFIRMATIONS: ${GMPAY_BSC_WATCHER_CONFIRMATIONS:-3}
      GMPAY_BSC_WATCHER_LOOKBACK_BLOCKS: ${GMPAY_BSC_WATCHER_LOOKBACK_BLOCKS:-1200}
      GMPAY_BSC_WATCHER_BLOCK_BATCH_SIZE: ${GMPAY_BSC_WATCHER_BLOCK_BATCH_SIZE:-10}
    depends_on:
      postgres:
        condition: service_healthy

  client:
    build:
      context: ..
      dockerfile: infra/docker/client.Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:3100:3000"
    environment:
      SERVER_INTERNAL_URL: ${SERVER_INTERNAL_URL:-http://server:4000}
    depends_on:
      - server

volumes:
  postgres_data:
